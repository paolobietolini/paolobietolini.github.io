version: 2

models:
  - name: fct_reconciliation
    description: >
      Full outer join of orders and GA4 purchases, with reconciliation
      status (matched, revenue_mismatch, missing_in_ga4, ghost_order).
      Partitioned by report_date, clustered by reconciliation_status.
    columns:
      - name: transaction_id
        tests:
          - unique
          - not_null
      - name: reconciliation_status
        tests:
          - accepted_values:
              arguments:
                values: ['matched', 'revenue_mismatch', 'missing_in_ga4', 'ghost_order']
      - name: report_date
        tests:
          - not_null
      - name: revenue_diff
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true

  - name: metrics_daily_summary
    description: "Daily aggregation of reconciliation outcomes for dashboarding"
    columns:
      - name: report_date
        tests:
          - not_null
      - name: transaction_count
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                inclusive: true
